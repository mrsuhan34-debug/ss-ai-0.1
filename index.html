<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0F172A; }
        .terminal-scroll::-webkit-scrollbar { width: 6px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #1E293B; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>
</head>
<body class="text-slate-200 font-sans min-h-screen flex flex-col p-4 md:p-8">

    <!-- Header -->
    <header class="mb-8">
        <h1 class="text-2xl font-bold text-white tracking-tight">AI ASSISTANT <span class="text-blue-500">CORE</span></h1>
        <p class="text-slate-400 text-sm">Autonomous Systems Controller v1.0</p>
    </header>

    <main class="flex-grow flex flex-col gap-6 max-w-4xl mx-auto w-full">

        <!-- Terminal Log Window -->
        <div class="bg-slate-900 border border-slate-700 rounded-lg overflow-hidden flex flex-col h-64 md:h-96 shadow-2xl">
            <div class="bg-slate-800 px-4 py-2 border-b border-slate-700 flex items-center justify-between">
                <span class="text-xs font-mono uppercase tracking-widest text-slate-400">Operations Terminal</span>
                <div class="flex gap-1.5">
                    <div class="w-2.5 h-2.5 rounded-full bg-red-500/50"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/50"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-green-500/50"></div>
                </div>
            </div>
            <div id="terminal" class="terminal-scroll p-4 font-mono text-sm overflow-y-auto flex-grow space-y-1">
                <div class="text-blue-400">[SYSTEM] Initialization complete...</div>
                <div class="text-green-400">[READY] Awaiting secure command...</div>
            </div>
        </div>

        <!-- Command Input Section -->
        <div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700 shadow-xl">
            <div class="flex flex-col gap-4">
                <div>
                    <label for="command" class="block text-xs font-semibold text-slate-400 uppercase mb-2 ml-1">Secure Command Input</label>
                    <input type="text" id="command" placeholder="Enter system directive..."
                        class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                </div>
                <button onclick="executeTask()"
                    class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-lg transition-colors shadow-lg active:transform active:scale-[0.98] uppercase tracking-wider text-sm">
                    Execute Core Task
                </button>
            </div>
        </div>
    </main>

    <footer class="mt-8 text-center text-slate-500 text-xs">
        &copy; 2023 YouTube AI Assistant • Secure Infrastructure Layer
    </footer>

    <script>
        function executeTask() {
            const input = document.getElementById('command');
            const terminal = document.getElementById('terminal');
            const cmd = input.value.trim();

            if (cmd) {
                const logEntry = document.createElement('div');
                logEntry.className = 'text-slate-300';
                logEntry.innerHTML = `<span class="text-blue-500">></span> ${cmd}`;
                terminal.appendChild(logEntry);

                // Simulate processing
                setTimeout(() => {
                    const response = document.createElement('div');
                    response.className = 'text-green-500';
                    response.textContent = `[SUCCESS] Task "${cmd}" processed successfully.`;
                    terminal.appendChild(response);
                    terminal.scrollTop = terminal.scrollHeight;
                }, 500);

                input.value = '';
                terminal.scrollTop = terminal.scrollHeight;
            }
        }
    </script>
</body>
</html>
